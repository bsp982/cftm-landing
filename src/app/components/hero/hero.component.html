<section id="hero" class="hero">
  <div class="hero__bg" aria-hidden="true"></div>
  <div class="hero__overlay" aria-hidden="true"></div>
  <div class="container hero__content">
    <p class="hero__eyebrow">Circuito oficial · Triângulo Mineiro</p>
    <h1 class="hero__title">
      <span class="hero__title-main">{{ site.name }}</span>
      <span class="hero__title-sub">{{ site.fullName }}</span>
    </h1>
    <p class="hero__tagline">{{ site.tagline }}</p>
    <div class="hero__actions">
      <a
        class="btn btn--accent"
        [href]="site.whatsappInscricao"
        target="_blank"
        rel="noopener noreferrer"
      >
        Faça sua inscrição
      </a>
      <button type="button" class="btn btn--outline" (click)="scrollTo('ranking')">Ver ranking</button>
      <button type="button" class="btn btn--outline" (click)="scrollTo('investidores')">Seja patrocinador</button>
    </div>
    <ul class="hero__stats">
      @for (stat of stats; track stat.label) {
        <li>
          <strong>{{ stat.value }}</strong>
          <span>{{ stat.label }}</span>
        </li>
      }
    </ul>
  </div>
  <div class="hero__slant" aria-hidden="true"></div>
</section>
