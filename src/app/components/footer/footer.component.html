<footer class="footer">
  <div class="container footer__inner">
    <div class="footer__brand">
      <img src="assets/logo-cftm.png" alt="CFTM" width="280" height="88" />
      <p>{{ site.fullName }}</p>
    </div>
    <div class="footer__links">
      <a [href]="site.instagram" target="_blank" rel="noopener noreferrer">Instagram {{ site.instagramHandle }}</a>
      <a href="mailto:{{ site.contactEmail }}">{{ site.contactEmail }}</a>
    </div>
    <p class="footer__copy">© {{ year }} CFTM. Todos os direitos reservados.</p>
  </div>
</footer>
